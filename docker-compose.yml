version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: temudok-event-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Database provider
      - DATABASE_PROVIDER=${DATABASE_PROVIDER:-firestore}
      # MySQL
      - MYSQL_HOST=${MYSQL_HOST:-host.docker.internal}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-temudok_event_app}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_CONNECTION_LIMIT=${MYSQL_CONNECTION_LIMIT:-10}
      # Firebase Config
      # Keep these commented when DATABASE_PROVIDER=mysql to avoid Docker Compose warnings
      # and to prevent unused Firebase configuration from being injected.
      # - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      # - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      # - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      # - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      # - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      # - FIREBASE_APP_ID=${FIREBASE_APP_ID}
      # - FIREBASE_DATABASE_ID=${FIREBASE_DATABASE_ID}
      # Midtrans
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION:-false}
      # Email (Nodemailer)
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-465}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Temudok Event}
      # Admin
      - ADMIN_USERNAME=${ADMIN_USERNAME:-adminidikaltim2026}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # App
      - APP_URL=${APP_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Persist uploaded files across container restarts
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/events"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads_data:
    driver: local
